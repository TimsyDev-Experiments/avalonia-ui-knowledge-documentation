<style>
  /* Viewer chrome */
  html, body { height: 100%; }
  body { display: flex; flex-direction: column; }

  #toolbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: .5rem 1.5rem;
    display: flex; align-items: center; gap: .75rem;
    font-size: .85rem;
    backdrop-filter: blur(6px);
  }

  #toolbar label { color: var(--text-secondary); white-space: nowrap; }
  #toolbar select {
    flex: 1; max-width: 500px;
    padding: .35rem .5rem;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg-card);
    color: var(--text-primary);
    font-size: .85rem;
  }
  #toolbar select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

  #toolbar a {
    color: var(--accent); text-decoration: none;
    padding: .3rem .6rem; border-radius: var(--radius-sm);
    white-space: nowrap;
  }
  #toolbar a:hover { background: var(--accent-light); }

  .doc-wrapper {
    display: flex; flex: 1;
    max-width: 1140px; margin: 0 auto; width: 100%;
  }

  .doc-content {
    flex: 1; min-width: 0;
    padding: 2rem 2rem 4rem;
  }

  /* TOC sidebar within viewer */
  .doc-toc {
    position: sticky; top: 3.5rem;
    width: 240px; max-height: calc(100vh - 4rem);
    overflow-y: auto; flex-shrink: 0;
    padding: 2rem 1rem 1rem 1.5rem;
    border-left: 1px solid var(--border);
    display: none;
    font-size: .8rem;
  }
  .doc-toc h4 {
    font-size: .7rem; text-transform: uppercase;
    letter-spacing: .08em; color: var(--text-secondary);
    margin: 0 0 .5rem;
  }
  .doc-toc a {
    display: block; color: var(--text-secondary); text-decoration: none;
    padding: .2rem 0; line-height: 1.4;
  }
  .doc-toc a:hover { color: var(--accent); }
  .doc-toc .h2 { font-weight: 500; }
  .doc-toc .h3 { padding-left: .75rem; }

  @media (min-width: 1100px) { .doc-toc { display: block; } }

  /* front-matter notice */
  .front-matter-notice {
    font-size: .8rem; color: var(--text-secondary);
    background: var(--bg-secondary);
    border-radius: var(--radius);
    padding: .5rem 1rem; margin-bottom: 1.5rem;
    border: 1px solid var(--border);
  }

  /* loading / error states */
  #loading, #error {
    text-align: center; padding: 4rem 2rem;
    color: var(--text-secondary);
  }
  #error { color: var(--error); }

  /* Don't show empty TOC */
  .doc-toc:empty { display: none !important; }

  /* fix front matter display */
  .doc-content .front-matter { display: none; }

  /* ─── Quiz styles ─────────────────────────────────────────────────── */
  .quiz-container {
    margin: 1.5rem 0;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-card);
    overflow: hidden;
  }

  .quiz-header {
    padding: 1rem 1.25rem .5rem;
    font-size: .95rem;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
  }

  .quiz-question {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border-light, var(--border));
  }
  .quiz-question:last-of-type { border-bottom: none; }

  .quiz-question-text {
    font-weight: 600;
    margin-bottom: .65rem;
    line-height: 1.4;
  }

  .quiz-option {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-start;
    gap: .5rem;
    padding: .5rem .75rem;
    margin: .25rem 0;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background .12s, border-color .12s;
    border: 1px solid transparent;
    user-select: none;
  }
  .quiz-option:hover:not(.disabled) {
    background: var(--accent-light, rgba(99,140,232,0.08));
    border-color: var(--accent-muted, rgba(99,140,232,0.3));
  }
  .quiz-option.selected {
    background: var(--accent-light, rgba(99,140,232,0.12));
    border-color: var(--accent);
  }
  .quiz-option.correct {
    background: rgba(74, 182, 122, 0.12);
    border-color: #4ab67a;
  }
  .quiz-option.incorrect {
    background: rgba(232, 99, 99, 0.1);
    border-color: #e86363;
  }
  .quiz-option.disabled { cursor: default; opacity: .8; }

  .quiz-option-marker {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 1.5rem;
    height: 1.5rem;
    border-radius: 50%;
    background: var(--bg-secondary);
    font-size: .75rem;
    font-weight: 600;
    flex-shrink: 0;
    margin-top: .05rem;
  }
  .quiz-option.selected .quiz-option-marker {
    background: var(--accent);
    color: #fff;
  }
  .quiz-option.correct .quiz-option-marker {
    background: #4ab67a;
    color: #fff;
  }
  .quiz-option.incorrect .quiz-option-marker {
    background: #e86363;
    color: #fff;
  }

  .quiz-option-text { flex: 1; line-height: 1.4; min-width: 0; }

  .quiz-option-explanation {
    flex-basis: 100%;
    margin-left: calc(1.5rem + .5rem);
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    font-size: .8rem;
    line-height: 1.4;
    color: var(--text-secondary);
    border-radius: var(--radius-sm);
    background: var(--bg-secondary);
    border-left: 2px solid transparent;
    word-break: break-word;
    transition: max-height .35s ease, opacity .35s ease, padding .35s ease, border-color .35s ease;
  }
  .quiz-completed .quiz-option-explanation {
    max-height: 300px;
    opacity: 1;
    padding: .4rem .5rem;
  }
  .quiz-option.correct .quiz-option-explanation {
    border-left-color: #4ab67a;
  }
  .quiz-option.incorrect .quiz-option-explanation {
    border-left-color: #e86363;
  }

  .quiz-explanation {
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    border-radius: var(--radius-sm);
    background: var(--bg-secondary);
    font-size: .85rem;
    line-height: 1.5;
    color: var(--text-secondary);
    border-left: 3px solid var(--accent);
    word-break: break-word;
    transition: max-height .35s ease, opacity .35s ease, padding .35s ease, margin .35s ease;
  }
  .quiz-completed .quiz-explanation {
    max-height: 500px;
    opacity: 1;
    padding: .75rem .85rem;
    margin-top: .65rem;
  }

  .quiz-actions {
    padding: 1rem 1.25rem;
    text-align: center;
    border-top: 1px solid var(--border);
  }

  .quiz-complete-btn {
    padding: .55rem 1.5rem;
    border: none;
    border-radius: var(--radius);
    background: var(--accent);
    color: #fff;
    font-size: .9rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity .15s;
  }
  .quiz-complete-btn:hover { opacity: .85; }
  .quiz-complete-btn:disabled { opacity: .5; cursor: default; }

  .quiz-result {
    display: none;
    padding: 1rem 1.25rem;
    text-align: center;
    font-size: .95rem;
    border-top: 1px solid var(--border);
  }
  .quiz-score.perfect { color: #4ab67a; }
  .quiz-score.good    { color: var(--accent); }
  .quiz-score.needs-work { color: #e8a04a; }

  .quiz-icon-pass { color: #4ab67a; font-weight: 700; }
  .quiz-icon-fail { color: #e86363; font-weight: 700; }
  .quiz-icon-neutral { color: var(--text-secondary); }

  .quiz-header-row {
    display: flex; align-items: center; gap: .5rem;
    margin-bottom: .25rem;
  }
  .quiz-header-row .quiz-badge {
    display: inline-block;
    padding: .1rem .4rem;
    border-radius: 3px;
    font-size: .65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .04em;
    background: var(--accent);
    color: #fff;
  }
</style>

// ─── Populate dropdown ──────────────────────────────────────────────
const select = document.getElementById('docSelect');

function buildGroupedOptions() {
  const groups = {
    "Quick Reference":  DOC_INDEX.filter(d => d.file.startsWith("01-")),
    "Basics":           DOC_INDEX.filter(d => d.file.includes("/basics/")),
    "Intermediate":     DOC_INDEX.filter(d => d.file.includes("/intermediate/")),
    "Advanced":         DOC_INDEX.filter(d => d.file.includes("/advanced/")),
    "Patterns":         DOC_INDEX.filter(d => d.file.startsWith("03-")),
    "Migration":        DOC_INDEX.filter(d => d.file.startsWith("04-")),
  };

  Object.entries(groups).forEach(([label, items]) => {
    if (!items.length) return;
    const group = document.createElement('optgroup');
    group.label = label;
    items.forEach(item => {
      const opt = document.createElement('option');
      opt.value = item.file;
      opt.textContent = item.label;
      group.appendChild(opt);
    });
    select.appendChild(group);
  });
}
buildGroupedOptions();

// ─── Load and render ────────────────────────────────────────────────
const contentDiv = document.getElementById('content');
const tocDiv    = document.getElementById('toc');

function stripFrontMatter(md) {
  return md.replace(/^---\n[\s\S]*?\n---\n/, '');
}

function extractFrontMatter(md) {
  const m = md.match(/^---\n([\s\S]*?)\n---\n/);
  return m ? m[1] : '';
}

function renderTOC(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const headings = doc.querySelectorAll('h2, h3');
  let tocHTML = '<h4>On this page</h4>';
  headings.forEach(h => {
    const id = h.textContent.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    h.id = id;
    tocHTML += `<a href="#${id}" class="${h.tagName.toLowerCase()}">${h.textContent}</a>`;
  });
  return { html: doc.body.innerHTML, toc: tocHTML };
}

async function loadDoc(file) {
  contentDiv.innerHTML = '<div id="loading">Loading…</div>';
  tocDiv.innerHTML = '';

  try {
    const resp = await fetch(file);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const md = await resp.text();
    const fm = extractFrontMatter(md);
    const body = stripFrontMatter(md);
    const rawHtml = marked.parse(body);
    const { html, toc } = renderTOC(rawHtml);

    let fmHtml = '';
    if (fm) {
      const lines = fm.split('\n').map(l => l.trim()).filter(l => l);
      fmHtml = `<div class="front-matter-notice">`;
      lines.forEach(l => {
        const [k, ...rest] = l.split(':');
        if (k) fmHtml += `<strong>${k.trim()}</strong>: ${rest.join(':').trim()}<br>`;
      });
      fmHtml += `</div>`;
    }

    contentDiv.innerHTML = fmHtml + html;
    tocDiv.innerHTML = toc;

    // Highlight all code blocks
    contentDiv.querySelectorAll('pre code').forEach(block => {
      if (block.classList.contains('language-quiz')) return; // skip quiz blocks
      hljs.highlightElement(block);
    });

    // Initialize interactive quizzes
    initQuizzes(contentDiv);

    // Update URL hash
    history.replaceState(null, '', `?file=${encodeURIComponent(file)}`);
    document.title = file.split('/').pop().replace('.md', '') + ' — Avalonia Docs';

  } catch (err) {
    contentDiv.innerHTML = `<div id="error">
      <h2>Failed to load document</h2>
      <p>${err.message}</p>
      <p><code>${file}</code></p>
      <p>Make sure you're opening this file via a local HTTP server, not directly as <code>file://</code>.
         See instructions below.</p>
    </div>`;
  }
}

// ─── Event handlers ──────────────────────────────────────────────────
select.addEventListener('change', () => {
  if (select.value) loadDoc(select.value);
});

// ─── Load from URL param or default ──────────────────────────────────
const params = new URLSearchParams(location.search);
const fileParam = params.get('file');

if (fileParam) {
  select.value = fileParam;
  loadDoc(fileParam);
} else {
  // default: index
  loadDoc('00-index.md');
}

// ─── Intercept internal links → load via viewer ──────────────────────
contentDiv.addEventListener('click', e => {
  const link = e.target.closest('a[href]');
  if (!link) return;
  const href = link.getAttribute('href');
  if (!href.endsWith('.md')) return;
  if (href.startsWith('http://') || href.startsWith('https://')) return;
  if (href.startsWith('#')) return;

  e.preventDefault();
  // Resolve relative paths against the current file's directory
  const currentFile = select.value || '00-index.md';
  const base = currentFile.substring(0, currentFile.lastIndexOf('/') + 1);
  const resolved = new URL(href, `http://localhost/${base}`).pathname.substring(1);

  select.value = resolved;
  loadDoc(resolved);
});

// Also intercept the home link
document.getElementById('homeLink').addEventListener('click', e => {
  e.preventDefault();
  select.value = '00-index.md';
  loadDoc('00-index.md');
});

// ─── Quiz system ─────────────────────────────────────────────────────
// Merges all ```quiz blocks on a page into a single graded quiz.
// Format per block:
//   Q: Question text
//   A. Option 1 (correct) || Why this is right.
//   B. Option 2 || Why this is wrong.
//   Explanation: Overall explanation covering key points.

function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function initQuizzes(container) {
  var blocks = container.querySelectorAll('pre code.language-quiz');
  if (blocks.length === 0) return;

  var allQuestions = [];
  var pres = [];

  blocks.forEach(function (codeEl) {
    pres.push(codeEl.parentElement);
    var text = codeEl.textContent;
    var questions = parseQuizText(text);
    questions.forEach(function (q) { allQuestions.push(q); });
  });

  if (allQuestions.length === 0) return;

  var quizDiv = buildQuizWidget(allQuestions);
  var firstPre = pres[0];
  firstPre.parentElement.insertBefore(quizDiv, firstPre);

  pres.forEach(function (pre) { pre.remove(); });
}

function parseQuizText(text) {
  var blocks = text.trim().split(/\n\n+/);
  return blocks.map(function (block) {
    var lines = block.trim().split('\n');
    var question = '';
    var options = [];
    var explanation = '';

    lines.forEach(function (line) {
      var trimmed = line.trim();
      if (trimmed.startsWith('Q:')) {
        question = trimmed.slice(2).trim();
      } else if (/^[A-Z]\.\s/.test(trimmed)) {
        var isCorrect = trimmed.includes('(correct)');
        var afterLetter = trimmed.replace(/^[A-Z]\.\s+/, '');
        // Split on || for per-option explanation
        var parts = afterLetter.split('||');
        var optText = parts[0]
          .replace(/\s*\(correct\)\s*$/, '')
          .trim();
        var optExplanation = parts.length > 1 ? parts.slice(1).join('||').trim() : '';
        if (optText) options.push({ text: optText, correct: isCorrect, explanation: optExplanation });
      } else if (trimmed.startsWith('Explanation:')) {
        explanation = trimmed.slice('Explanation:'.length).trim();
      }
    });

    return { question: question, options: options, explanation: explanation };
  }).filter(function (q) { return q.question && q.options.length > 0; });
}

function buildQuizWidget(questions) {
  var container = document.createElement('div');
  container.className = 'quiz-container';

  // header with question count
  var header = document.createElement('div');
  header.className = 'quiz-header';
  header.innerHTML = '<span class="quiz-header-row"><span class="quiz-badge">Quiz</span> <span>' + questions.length + ' questions</span></span>';
  container.appendChild(header);

  // questions
  questions.forEach(function (q, qi) {
    var qDiv = document.createElement('div');
    qDiv.className = 'quiz-question';
    qDiv.dataset.questionIndex = qi;

    var qText = document.createElement('div');
    qText.className = 'quiz-question-text';
    qText.textContent = (qi + 1) + '. ' + q.question;
    qDiv.appendChild(qText);

    var optList = document.createElement('div');
    optList.className = 'quiz-options';
    optList.dataset.questionIndex = qi;

    q.options.forEach(function (opt, oi) {
      var optEl = document.createElement('div');
      optEl.className = 'quiz-option';
      optEl.dataset.optionIndex = oi;
      optEl.dataset.correct = opt.correct;

      var marker = document.createElement('span');
      marker.className = 'quiz-option-marker';
      marker.textContent = String.fromCharCode(65 + oi);
      optEl.appendChild(marker);

      var textSpan = document.createElement('span');
      textSpan.className = 'quiz-option-text';
      textSpan.textContent = opt.text;
      optEl.appendChild(textSpan);

      // per-option explanation (hidden until complete)
      if (opt.explanation) {
        var optExpl = document.createElement('div');
        optExpl.className = 'quiz-option-explanation';
        optExpl.textContent = opt.explanation;
        optEl.appendChild(optExpl);
      }

      optEl.addEventListener('click', function () {
        if (container.classList.contains('quiz-completed')) return;
        optList.querySelectorAll('.quiz-option').forEach(function (o) {
          o.classList.remove('selected');
        });
        this.classList.add('selected');
      });

      optList.appendChild(optEl);
    });

    qDiv.appendChild(optList);

    // overall explanation (hidden until complete)
    var expl = document.createElement('div');
    expl.className = 'quiz-explanation';
    expl.textContent = q.explanation;
    qDiv.appendChild(expl);

    container.appendChild(qDiv);
  });

  // actions — one button for the entire quiz
  var actions = document.createElement('div');
  actions.className = 'quiz-actions';
  var btn = document.createElement('button');
  btn.className = 'quiz-complete-btn';
  btn.textContent = 'Complete Quiz';
  btn.addEventListener('click', function () { completeQuiz(container); });
  actions.appendChild(btn);
  container.appendChild(actions);

  // result area
  var result = document.createElement('div');
  result.className = 'quiz-result';
  container.appendChild(result);

  return container;
}

function completeQuiz(quizDiv) {
  quizDiv.classList.add('quiz-completed');

  var questions = quizDiv.querySelectorAll('.quiz-question');
  var correct = 0;
  var total = questions.length;

  questions.forEach(function (q) {
    var selected = q.querySelector('.quiz-option.selected');
    var isCorrect = selected ? selected.dataset.correct === 'true' : false;

    q.querySelectorAll('.quiz-option').forEach(function (opt) {
      opt.classList.add('disabled');
      if (opt.dataset.correct === 'true') opt.classList.add('correct');
      if (opt.classList.contains('selected') && opt.dataset.correct !== 'true') {
        opt.classList.add('incorrect');
      }
    });

    if (isCorrect) correct++;
  });

  // score
  var result = quizDiv.querySelector('.quiz-result');
  var pct = Math.round((correct / total) * 100);
  var status, cls;
  if (pct === 100)       { status = 'Perfect score!';          cls = 'perfect'; }
  else if (pct >= 70)    { status = 'Good job!';               cls = 'good'; }
  else                   { status = 'Review the explanations below';  cls = 'needs-work'; }

  result.innerHTML =
    '<div class="quiz-score ' + cls + '">' +
    '<strong>' + correct + '/' + total + '</strong> correct (' + pct + '%) — ' + status +
    '</div>';
  result.style.display = 'block';

  var btn = quizDiv.querySelector('.quiz-complete-btn');
  btn.textContent = 'Completed';
  btn.disabled = true;
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    select.focus();
  }
});
